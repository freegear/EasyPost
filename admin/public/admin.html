<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyPost-관리 페이지</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;background:linear-gradient(120deg,#edf9f1,#f7fbf7 45%,#e2f3e7);color:#172019;min-height:100vh}
    header{height:82px;background:rgba(255,255,255,.9);border-bottom:1px solid #dce9df;display:flex;align-items:center;justify-content:space-between;padding:0 5vw;box-shadow:0 2px 16px rgba(0,0,0,.05)}
    .logo{width:210px}.admin-info{display:flex;align-items:center;gap:12px;font-weight:700}.logout{border:0;border-radius:8px;padding:9px 16px;background:#e5484d;color:#fff;font-weight:700;cursor:pointer}
    main{padding:28px 5vw 50px}.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.toolbar h1{margin:0;font-size:28px}.add{border:0;border-radius:9px;padding:11px 18px;background:#4c7f62;color:#fff;font-weight:800;cursor:pointer}
    .card{background:rgba(255,255,255,.86);border:1px solid #c7d7ca;border-radius:14px;box-shadow:0 7px 20px rgba(0,0,0,.12);overflow:auto}
    table{width:100%;border-collapse:collapse;min-width:1000px}th,td{padding:13px 14px;border-bottom:1px solid #e3e9e5;text-align:left;font-size:14px}th{background:#f5faf6;color:#405349;white-space:nowrap}tr:last-child td{border-bottom:0}
    .badge{display:inline-block;border-radius:99px;padding:4px 9px;font-size:12px;font-weight:800}.on{background:#dff2e4;color:#21663a}.off{background:#eee;color:#666}.admin{background:#e4e9ff;color:#354eb5}
    .actions{display:flex;gap:6px}.actions button{border:0;border-radius:7px;padding:7px 11px;font-weight:700;cursor:pointer}.edit{background:#e5efe8;color:#315c44}.delete{background:#fde4e4;color:#b42323}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.48);display:none;align-items:center;justify-content:center;padding:20px}.modal.open{display:flex}.modal-card{width:min(500px,100%);background:#fff;border-radius:16px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.3)}.modal-card h2{margin:0 0 18px}
    .field{margin-bottom:13px}.field label{display:block;margin-bottom:5px;font-size:13px;font-weight:800;color:#506057}.field input[type=text],.field input[type=password],.field input[type=email],.field input[type=tel]{width:100%;padding:10px 12px;border:1px solid #bdcec1;border-radius:8px;font-size:14px}.checks{display:flex;gap:20px;margin:15px 0}.modal-actions{display:flex;justify-content:flex-end;gap:8px}.modal-actions button{border:0;border-radius:8px;padding:10px 17px;font-weight:800;cursor:pointer}.save{background:#4c7f62;color:#fff}.cancel{background:#edf1ee;color:#333}.message{min-height:20px;margin:12px 0;color:#b42323;font-size:13px}
  </style>
</head>
<body>
  <header>
    <img class="logo" src="/easypost-logo.svg" alt="EasyPost">
    <div class="admin-info"><span id="adminName">관리자</span><button class="logout" id="logoutBtn">로그아웃</button></div>
  </header>
  <main>
    <div class="toolbar"><h1>EasyPost-관리 페이지</h1><button class="add" id="addBtn">사용자 추가</button></div>
    <div class="card">
      <table>
        <thead><tr><th>ID</th><th>사용자 ID</th><th>E-mail</th><th>전화번호</th><th>상태</th><th>권한</th><th>마지막 로그인</th><th>가입일</th><th>관리</th></tr></thead>
        <tbody id="usersBody"></tbody>
      </table>
    </div>
  </main>
  <div class="modal" id="userModal">
    <form class="modal-card" id="userForm">
      <h2 id="modalTitle">사용자 추가</h2>
      <input type="hidden" id="userId">
      <div class="field"><label>사용자 ID</label><input id="formUsername" type="text" maxlength="50" required></div>
      <div class="field"><label>비밀번호 <span id="passwordHint"></span></label><input id="formPassword" type="password"></div>
      <div class="field"><label>E-mail</label><input id="formEmail" type="email" maxlength="100"></div>
      <div class="field"><label>전화번호</label><input id="formPhone" type="tel" maxlength="30"></div>
      <div class="checks"><label><input id="formActive" type="checkbox" checked> 활성 사용자</label><label><input id="formAdmin" type="checkbox"> 관리자</label></div>
      <div class="message" id="formMessage"></div>
      <div class="modal-actions"><button class="cancel" type="button" id="cancelBtn">취소</button><button class="save" type="submit">저장</button></div>
    </form>
  </div>
  <script>
    const modal = document.getElementById('userModal');
    const usersBody = document.getElementById('usersBody');
    const fields = {
      id: document.getElementById('userId'), username: document.getElementById('formUsername'),
      password: document.getElementById('formPassword'), email: document.getElementById('formEmail'),
      phone: document.getElementById('formPhone'), active: document.getElementById('formActive'),
      admin: document.getElementById('formAdmin'), message: document.getElementById('formMessage'),
    };
    let users = [];
    const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const formatDate = value => value ? new Date(value).toLocaleString('ko-KR', {timeZone:'Asia/Seoul'}) : '-';
    async function api(url, options={}) {
      const response = await fetch(url, {headers:{'Content-Type':'application/json',...(options.headers||{})},...options});
      const data = await response.json().catch(()=>({}));
      if (response.status === 401) location.href='/';
      if (!response.ok) throw new Error(data.error || '요청 처리에 실패했습니다.');
      return data;
    }
    function render() {
      usersBody.innerHTML = users.map(user => `<tr>
        <td>${user.id}</td><td><b>${escapeHtml(user.username)}</b></td><td>${escapeHtml(user.email || '-')}</td><td>${escapeHtml(user.phone_number || '-')}</td>
        <td><span class="badge ${user.is_active?'on':'off'}">${user.is_active?'활성':'비활성'}</span></td>
        <td>${user.is_admin?'<span class="badge admin">관리자</span>':'일반 사용자'}</td><td>${formatDate(user.last_login_at)}</td><td>${formatDate(user.created_at)}</td>
        <td><div class="actions"><button class="edit" data-edit="${user.id}">편집</button><button class="delete" data-delete="${user.id}">삭제</button></div></td>
      </tr>`).join('');
    }
    async function loadUsers() { users=(await api('/api/users')).users; render(); }
    function openModal(user=null) {
      fields.id.value=user?.id||''; fields.username.value=user?.username||''; fields.password.value='';
      fields.email.value=user?.email||''; fields.phone.value=user?.phone_number||''; fields.active.checked=user?.is_active??true;
      fields.admin.checked=user?.is_admin??false; fields.message.textContent='';
      fields.username.readOnly=Boolean(user);
      document.getElementById('modalTitle').textContent=user?'사용자 편집':'사용자 추가';
      document.getElementById('passwordHint').textContent=user?'(변경할 때만 입력)':'(필수)';
      modal.classList.add('open');
    }
    document.getElementById('addBtn').onclick=()=>openModal();
    document.getElementById('cancelBtn').onclick=()=>modal.classList.remove('open');
    modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open')});
    usersBody.addEventListener('click',async e=>{
      const editId=Number(e.target.dataset.edit); const deleteId=Number(e.target.dataset.delete);
      if(editId) openModal(users.find(user=>user.id===editId));
      if(deleteId && confirm('이 사용자를 삭제할까요?')) { try{await api(`/api/users/${deleteId}`,{method:'DELETE'});await loadUsers()}catch(err){alert(err.message)} }
    });
    document.getElementById('userForm').addEventListener('submit',async e=>{
      e.preventDefault(); const id=fields.id.value;
      const body={username:fields.username.value.trim(),password:fields.password.value,email:fields.email.value.trim(),phone_number:fields.phone.value.trim(),is_active:fields.active.checked,is_admin:fields.admin.checked};
      if(!id&&!body.password){fields.message.textContent='비밀번호를 입력해주세요.';return}
      try{await api(id?`/api/users/${id}`:'/api/users',{method:id?'PUT':'POST',body:JSON.stringify(body)});modal.classList.remove('open');await loadUsers()}catch(err){fields.message.textContent=err.message}
    });
    document.getElementById('logoutBtn').onclick=()=>fetch('/logout',{method:'POST'}).finally(()=>location.href='/');
    api('/api/me').then(data=>document.getElementById('adminName').textContent=`${data.username} 관리자`);
    loadUsers();
  </script>
</body>
</html>
