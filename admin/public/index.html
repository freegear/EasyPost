<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyPost 관리자 로그인</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eef4ff url('/login-background.png') center/cover fixed;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .card{position:relative;overflow:hidden;background:linear-gradient(145deg,rgba(255,255,255,.64),rgba(235,243,255,.38));border:1px solid rgba(255,255,255,.86);border-radius:24px;padding:44px 40px;width:100%;max-width:400px;box-shadow:0 30px 80px rgba(39,68,132,.2),inset 0 1px 0 rgba(255,255,255,.95);backdrop-filter:blur(24px) saturate(145%)}
    .card::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 18% 0%,rgba(255,255,255,.78),transparent 42%)}
    .logo{position:relative;display:block;width:190px;height:auto;margin:0 auto 18px}
    .admin-title{position:relative;text-align:center;color:#263b70;font-size:16px;font-weight:800;margin-bottom:24px}
    form{position:relative} label{display:block;font-size:12px;color:#41516d;margin-bottom:6px;font-weight:700}
    input{width:100%;padding:11px 14px;background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.92);border-radius:12px;color:#17233b;font-size:14px;outline:none;margin-bottom:16px}
    button{width:100%;padding:12px;background:linear-gradient(135deg,#4b8bf8,#5269e6);color:#fff;border:1px solid rgba(255,255,255,.5);border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}
    .error{color:#d93434;font-size:13px;margin-top:14px;text-align:center;display:none}
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/easypost-logo.svg" alt="EasyPost">
    <div class="admin-title">EasyPost-관리 페이지</div>
    <form id="loginForm">
      <label for="username">아이디</label>
      <input id="username" autocomplete="username" required>
      <label for="password">비밀번호</label>
      <input id="password" type="password" autocomplete="current-password" required>
      <button id="submitBtn">로그인</button>
      <p class="error" id="errorMsg"></p>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async event => {
      event.preventDefault();
      const button = document.getElementById('submitBtn');
      const error = document.getElementById('errorMsg');
      button.disabled = true;
      error.style.display = 'none';
      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({username: username.value, password: password.value}),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || '로그인에 실패했습니다.');
        location.href = data.redirect;
      } catch (err) {
        error.textContent = err.message;
        error.style.display = 'block';
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
