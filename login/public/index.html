<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyPost Login</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #eef4ff url('/login-background.png') center center / cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.64), rgba(235, 243, 255, 0.38));
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 24px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow:
        0 30px 80px rgba(39, 68, 132, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(24px) saturate(145%);
      -webkit-backdrop-filter: blur(24px) saturate(145%);
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 18% 0%, rgba(255, 255, 255, 0.78), transparent 42%);
    }
    .logo {
      position: relative;
      display: block;
      width: 190px;
      height: auto;
      margin: 0 auto 10px;
    }
    form { position: relative; }
    label {
      display: block;
      font-size: 12px;
      color: #41516d;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.92);
      border-radius: 12px;
      color: #17233b;
      font-size: 14px;
      outline: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.85),
        0 8px 24px rgba(43, 70, 132, 0.08);
      backdrop-filter: blur(12px);
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      margin-bottom: 16px;
    }
    input:focus {
      background: rgba(255, 255, 255, 0.72);
      border-color: rgba(79, 142, 247, 0.72);
      box-shadow: 0 0 0 4px rgba(79, 142, 247, 0.13), 0 10px 28px rgba(43, 70, 132, 0.12);
    }
    input::placeholder { color: #8793a8; }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, rgba(75, 139, 248, 0.95), rgba(82, 105, 230, 0.92));
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      box-shadow: 0 12px 26px rgba(61, 104, 210, 0.24), inset 0 1px 0 rgba(255, 255, 255, 0.42);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      letter-spacing: 0.2px;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(61, 104, 210, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.48);
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      color: #f56565;
      font-size: 13px;
      margin-top: 14px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/easypost-logo.svg" alt="EasyPost">
    <form id="loginForm">
      <label for="username">아이디</label>
      <input type="text" id="username" name="username" placeholder="아이디 입력" autocomplete="username" required>
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" placeholder="비밀번호 입력" autocomplete="current-password" required>
      <button type="submit" id="submitBtn">로그인</button>
      <p class="error" id="errorMsg"></p>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.textContent = '로그인 중...';
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = data.redirect;
        } else {
          errorMsg.textContent = data.error;
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '로그인';
        }
      } catch {
        errorMsg.textContent = '네트워크 오류가 발생했습니다.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    });
  </script>
</body>
</html>
