<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyPost Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 13px;
      color: #555;
      margin-bottom: 36px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #777;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      background: #111;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #4f8ef7; }
    input::placeholder { color: #3a3a3a; }
    button {
      width: 100%;
      padding: 12px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s, opacity 0.15s;
      letter-spacing: 0.2px;
    }
    button:hover { background: #3a7ae0; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      color: #f56565;
      font-size: 13px;
      margin-top: 14px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">EasyPost</div>
    <p class="subtitle">계속하려면 로그인하세요.</p>
    <form id="loginForm">
      <label for="username">아이디</label>
      <input type="text" id="username" name="username" placeholder="아이디 입력" autocomplete="username" required>
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" placeholder="비밀번호 입력" autocomplete="current-password" required>
      <button type="submit" id="submitBtn">로그인</button>
      <p class="error" id="errorMsg"></p>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.textContent = '로그인 중...';
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = data.redirect;
        } else {
          errorMsg.textContent = data.error;
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '로그인';
        }
      } catch {
        errorMsg.textContent = '네트워크 오류가 발생했습니다.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    });
  </script>
</body>
</html>
